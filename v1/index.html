<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cricket Sideview Game</title>
</head>

<body>
    <div class="game-container">
        <div class="sky">
            <div class="scoreboard">
                <div class="score-row">
                    <span class="score-label">Runs:</span>
                    <span id="score-runs">0</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Wickets:</span>
                    <span id="score-wickets">0</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Overs/Balls Left:</span>
                    <span id="score-overs">0.0</span>
                </div>
            </div>
        </div>
        <div class="grass"></div>
        <div class="pitch">

            <div class="stumps">
                <div class="stump stump-left"></div>
                <div class="stump stump-mid"></div>
                <div class="stump stump-right"></div>
                <div class="bails"></div>
            </div>

            <div class="batsman">
                <div class="head"></div>
                <div class="body"></div>
                <div class="leg leg-front"></div>
                <div class="leg leg-back"></div>
                <div class="arm">
                    <div class="bat"></div>
                </div>
            </div>
            
            <div class="ball" id="ball"></div>
        </div>
        <div id="run-text" class="run-burst"></div>
    </div>

    <div class="controls-container">
        <div class="style-selection">
            <button id="btn-aggressive" class="style-btn" onclick="setStyle('aggressive')">Aggressive</button>
            <button id="btn-defensive" class="style-btn active" onclick="setStyle('defensive')">Defensive</button>
        </div>

        <div class="probability-slider-container">
            <div class="slider-track" id="slider-track">
                <div class="segment wicket" style="width: 40%;">Wicket</div>
                <div class="segment score-0" style="width: 10%;">0</div>
                <div class="segment score-1" style="width: 10%;">1</div>
                <div class="segment score-2" style="width: 10%;">2</div>
                <div class="segment score-3" style="width: 5%;">3</div>
                <div class="segment score-4" style="width: 10%;">4</div>
                <div class="segment score-6" style="width: 15%;">6</div>
                <div class="slider-pointer" id="slider-pointer">
                    <div class="pointer-box"></div>
                </div>
            </div>
        </div>

        <button id="btn-restart" class="restart-btn" onclick="restartGame()">Restart Game</button>

    </div>

    <script src="script.js"></script>
</body>

</html>
