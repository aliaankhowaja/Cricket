<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cricket Sideview Game</title>
</head>
<body>
    <div class="controls">
        <button id="btn-shot" class="action-btn" onclick="shot()">Play Shot</button>
        <button id="btn-wicket" class="action-btn" onclick="wicket()">Wicket</button>
    </div>

    <div class="game-container">
        <div class="sky">
            <div class="scoreboard-wooden">
                <div class="score-row">
                    <span class="score-label">Runs:</span>
                    <span id="score-runs">0</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Wickets:</span>
                    <span id="score-wickets">0</span>
                </div>
                <div class="score-row">
                    <span class="score-label">Overs/Balls Left:</span>
                    <span id="score-overs">0.0</span>
                </div>
            </div>
        </div>
        <div class="grass"></div>
        <div class="pitch">
            
            <div class="stumps">
                <div class="stump stump-left"></div>
                <div class="stump stump-mid"></div>
                <div class="stump stump-right"></div>
                <div class="bails"></div>
            </div>

            <div class="batsman">
                <div class="head"></div>
                <div class="body"></div>
                <div class="leg leg-front"></div>
                <div class="leg leg-back"></div>
                <div class="arm">
                    <div class="bat"></div>
                </div>
            </div>

            <div class="ball" id="ball"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
